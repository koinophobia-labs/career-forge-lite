name: Failing regression artifacts

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_COMMERCE_MODE: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run failing scripts and retain complete logs
        id: scripts
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          node scripts/input-stability-regression.mjs > diagnostics/input-stability.log 2>&1
          input_status=$?
          node scripts/dossier-pack-regression.mjs > diagnostics/dossier-pack.log 2>&1
          dossier_status=$?
          node scripts/market-moat-regression.mjs > diagnostics/market-moat.log 2>&1
          market_status=$?
          printf 'input-stability=%s\ndossier-pack=%s\nmarket-moat=%s\n' "$input_status" "$dossier_status" "$market_status" | tee diagnostics/status.txt
          exit $(( input_status || dossier_status || market_status ))
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-logs
          path: diagnostics
          if-no-files-found: error
          retention-days: 7
