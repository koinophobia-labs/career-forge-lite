name: Product quality gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_COMMERCE_MODE: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deterministic regression suite
        run: npm run test:unit

      - name: Run desktop and mobile browser regression
        shell: bash
        run: timeout 12m npm run test:browser

      - name: Run redacted private acceptance fixture
        run: npm run acceptance:private

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
