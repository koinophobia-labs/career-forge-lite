name: Product quality gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_COMMERCE_MODE: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply pending commercial readiness repair
        run: node scripts/apply-commercial-readiness-fixes.mjs

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deterministic regression suite
        run: npm run test:unit

      - name: Run desktop and mobile browser regression
        shell: bash
        run: timeout 12m npm run test:browser

      - name: Run redacted private acceptance fixture
        run: npm run acceptance:private

      - name: Run full first-time-user journey (test-mode commerce)
        shell: bash
        run: timeout 8m npm run acceptance:journey | tee journey-output.log

      - name: Run backup and recovery proof
        shell: bash
        run: timeout 8m npm run acceptance:recovery | tee recovery-output.log

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Package repaired source and test evidence
        if: always()
        shell: bash
        run: |
          git status --short > repaired-status.txt
          git diff --binary > commercial-readiness.patch
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=test-results \
            --exclude=playwright-report \
            --exclude=repaired-source.tar.gz \
            -czf repaired-source.tar.gz .

      - name: Preserve repaired source and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-readiness-repair
          path: |
            repaired-source.tar.gz
            commercial-readiness.patch
            repaired-status.txt
            journey-output.log
            recovery-output.log
          if-no-files-found: warn
