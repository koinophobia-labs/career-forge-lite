name: Product quality gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_COMMERCE_MODE: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deterministic regression suite
        shell: bash
        run: set -o pipefail; npm run test:unit 2>&1 | tee unit-output.log

      - name: Run desktop and mobile browser regression
        shell: bash
        run: set -o pipefail; timeout 12m npm run test:browser 2>&1 | tee browser-output.log

      - name: Run redacted private acceptance fixture
        run: npm run acceptance:private

      - name: Run full first-time-user journey (test-mode commerce)
        shell: bash
        run: set -o pipefail; timeout 8m npm run acceptance:journey 2>&1 | tee journey-output.log

      - name: Run backup and recovery proof
        shell: bash
        run: set -o pipefail; timeout 8m npm run acceptance:recovery 2>&1 | tee recovery-output.log

      - name: Preserve quality-gate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: |
            unit-output.log
            browser-output.log
            journey-output.log
            recovery-output.log
          if-no-files-found: warn

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
