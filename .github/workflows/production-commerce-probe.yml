name: Production commerce probe

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify production alias and checkout configuration
        shell: bash
        run: |
          set -euo pipefail
          base="https://career-forge-lite.vercel.app"
          page="$(mktemp)"
          response="$(mktemp)"

          page_status="$(curl --retry 8 --retry-all-errors --retry-delay 5 -sS -o "$page" -w '%{http_code}' "$base/?probe=${GITHUB_SHA}")"
          PAGE_STATUS="$page_status" PAGE_FILE="$page" python - <<'PY'
          import json, os, pathlib
          text = pathlib.Path(os.environ['PAGE_FILE']).read_text(errors='replace')
          result = {
              'page_status': int(os.environ['PAGE_STATUS']),
              'new_build_marker': 'Local-first career evidence compiler' in text,
              'stale_build_marker': 'Product Lab Module 05' in text,
              'pricing_link_present': '/pricing' in text,
          }
          print(json.dumps(result, sort_keys=True))
          pathlib.Path('production-page-probe.json').write_text(json.dumps(result, indent=2) + '\n')
          if result['page_status'] != 200 or not result['new_build_marker'] or result['stale_build_marker']:
              raise SystemExit('Production alias is not serving the merged Career Forge build.')
          PY

          checkout_status="$(curl --retry 5 --retry-all-errors --retry-delay 3 -sS -o "$response" -w '%{http_code}' \
            -X POST "$base/api/checkout" \
            -H 'content-type: application/json' \
            --data '{"tier":"reset"}')"
          CHECKOUT_STATUS="$checkout_status" CHECKOUT_FILE="$response" python - <<'PY'
          import json, os, pathlib, urllib.parse
          raw = pathlib.Path(os.environ['CHECKOUT_FILE']).read_text(errors='replace')
          try:
              payload = json.loads(raw)
          except Exception:
              payload = {}
          url = payload.get('url') if isinstance(payload, dict) else None
          result = {
              'checkout_status': int(os.environ['CHECKOUT_STATUS']),
              'checkout_configured': bool(url),
              'checkout_host': urllib.parse.urlparse(url).hostname if url else None,
              'error': payload.get('error') if isinstance(payload, dict) else 'invalid JSON response',
          }
          print(json.dumps(result, sort_keys=True))
          pathlib.Path('production-commerce-probe.json').write_text(json.dumps(result, indent=2) + '\n')
          PY

      - name: Preserve probe result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-commerce-probe
          path: |
            production-page-probe.json
            production-commerce-probe.json
          if-no-files-found: warn
