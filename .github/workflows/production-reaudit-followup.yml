name: Production re-audit follow-up

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  followup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AUDIT_BASE_URL: https://career-forge-lite.vercel.app
      AUDIT_FOLLOWUP_OUTPUT_DIR: audit-followup
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_COMMERCE_MODE: "off"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and renderers
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils libreoffice-writer

      - name: Run targeted follow-up audit
        run: node scripts/production-reaudit-followup.mjs

      - name: Upload follow-up evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-forge-production-reaudit-followup
          path: audit-followup
          if-no-files-found: error
          retention-days: 14
