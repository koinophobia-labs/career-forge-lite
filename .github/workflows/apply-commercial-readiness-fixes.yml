name: Apply commercial readiness fixes

on:
  push:
    branches:
      - feature/paid-beta-surge

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out paid-beta branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply the one-off Codex repair
        run: node scripts/apply-commercial-readiness-fixes.mjs

      - name: Remove one-off repair scaffolding
        run: |
          git rm scripts/apply-commercial-readiness-fixes.mjs
          git rm .github/workflows/apply-commercial-readiness-fixes.yml

      - name: Commit repaired source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Fix paid beta release blockers"
          git push origin HEAD:feature/paid-beta-surge
