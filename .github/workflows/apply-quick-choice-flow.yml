name: Apply quick-choice flow repair

on:
  push:
    branches:
      - agent/surface-quick-choices

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused repair
        run: node scripts/apply-quick-choice-flow.mjs

      - name: Install dependencies
        run: npm ci

      - name: Verify quick-choice contract
        run: node scripts/quick-choice-flow-regression.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit regression suite
        run: npm run test:unit

      - name: Commit repaired product flow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/IntakeForm.tsx scripts/quick-choice-flow-regression.mjs package.json
          if git diff --cached --quiet; then
            echo "No product changes to commit."
          else
            git commit -m "Surface guided quick choices"
            git push origin HEAD:agent/surface-quick-choices
          fi
